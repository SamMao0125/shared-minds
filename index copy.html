<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dot Grid</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; overflow: hidden; width: 100vw; height: 100vh; cursor: none; font-family: monospace; }
  canvas { display: block; }

  #auth-overlay {
    position: fixed; inset: 0; background: #111;
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  #auth-box {
    border: 1px solid #2a2a2a; padding: 48px 40px; text-align: center; width: 320px;
  }
  #auth-box h1 { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #444; margin-bottom: 8px; }
  #auth-box p { font-size: 11px; color: #2e2e2e; margin-bottom: 32px; line-height: 1.8; }
  .auth-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 11px; background: #1a1a1a; border: 1px solid #2a2a2a;
    color: #888; font-family: monospace; font-size: 11px; letter-spacing: 1px;
    cursor: pointer; transition: border-color 0.15s, color 0.15s; margin-bottom: 10px;
  }
  .auth-btn:hover { border-color: #555; color: #ccc; }
  #guest-btn { color: #333; border-color: #1e1e1e; }
  #guest-btn:hover { border-color: #333; color: #555; }
  #auth-error { font-size: 10px; color: #6a2020; margin-top: 12px; min-height: 14px; }

  #tooltip {
    position: fixed; pointer-events: none; z-index: 50;
    background: #0d0d0d; border: 1px solid #2a2a2a;
    padding: 7px 10px; font-size: 10px; color: #555;
    letter-spacing: 0.5px; line-height: 1.6; white-space: nowrap; display: none;
  }
  #tooltip .name { color: #aaa; }

  #user-badge {
    position: fixed; top: 16px; left: 16px; z-index: 50;
    font-size: 10px; color: #2a2a2a; letter-spacing: 1px;
    display: none; align-items: center; gap: 8px;
  }
  #badge-name { color: #444; }
  #settings-btn, #signout-btn {
    background: none; border: 1px solid #222; color: #333; font-family: monospace;
    font-size: 10px; cursor: pointer; padding: 3px 7px; letter-spacing: 1px;
    transition: border-color 0.15s, color 0.15s;
  }
  #settings-btn:hover, #signout-btn:hover { border-color: #555; color: #777; }

  #settings-panel {
    position: fixed; top: 42px; left: 16px; z-index: 60;
    background: #0d0d0d; border: 1px solid #2a2a2a;
    padding: 16px; width: 210px; display: none;
  }
  #settings-panel h2 { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #333; margin-bottom: 14px; }
  .setting-row { margin-bottom: 12px; }
  .setting-label { font-size: 10px; color: #333; letter-spacing: 1px; margin-bottom: 7px; display: flex; justify-content: space-between; }
  .setting-label span { color: #555; }
  #color-swatches { display: flex; gap: 5px; flex-wrap: wrap; }
  .swatch {
    width: 16px; height: 16px; border: 1px solid #222; cursor: pointer;
    transition: border-color 0.1s; border-radius: 2px; flex-shrink: 0;
  }
  .swatch:hover, .swatch.active { border-color: #888; }
  #size-slider {
    width: 100%; cursor: pointer; -webkit-appearance: none;
    height: 2px; background: #2a2a2a; outline: none; border-radius: 1px;
    accent-color: #444;
  }
  #size-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px;
    background: #555; border-radius: 50%; cursor: pointer;
  }
  #save-prefs-btn {
    width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #2a2a2a;
    color: #555; font-family: monospace; font-size: 10px; letter-spacing: 1px;
    cursor: pointer; margin-top: 4px; transition: border-color 0.15s, color 0.15s;
  }
  #save-prefs-btn:hover { border-color: #555; color: #aaa; }
  #save-msg { font-size: 10px; color: #2a6a2a; margin-top: 8px; min-height: 14px; text-align: center; }

  #status {
    position: fixed; bottom: 16px; right: 16px;
    font-size: 11px; color: #2a2a2a; user-select: none; pointer-events: none;
  }
</style>
</head>
<body>

<div id="auth-overlay">
  <div id="auth-box">
    <h1>Dot Grid</h1>
    <p>A live collaborative canvas.<br>Sign in or continue as guest.</p>
    <button class="auth-btn" id="google-btn">
      <svg width="14" height="14" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.8 6C12.4 13 17.8 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-10 6.9-17z"/>
        <path fill="#FBBC05" d="M10.5 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.6 10.7l7.9-6z"/>
        <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.9l-7.9 6C6.7 42.6 14.7 48 24 48z"/>
      </svg>
      Continue with Google
    </button>
    <button class="auth-btn" id="guest-btn">Continue as Guest</button>
    <div id="auth-error"></div>
  </div>
</div>

<div id="user-badge">
  <span id="badge-name"></span>
  <button id="settings-btn">settings</button>
  <button id="signout-btn">sign out</button>
</div>

<div id="settings-panel">
  <h2>Vignette</h2>
  <div class="setting-row">
    <div class="setting-label"><span>color</span><span id="color-label">white</span></div>
    <div id="color-swatches"></div>
  </div>
  <div class="setting-row">
    <div class="setting-label"><span>size</span><span id="size-label">large</span></div>
    <input type="range" id="size-slider" min="1" max="3" step="1" value="3">
  </div>
  <button id="save-prefs-btn">save preferences</button>
  <div id="save-msg"></div>
</div>

<div id="tooltip"></div>
<canvas id="c"></canvas>
<div id="status">connecting...</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, runTransaction, set, remove, onDisconnect } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyBVmOkTtCncRJloNKUK8l3rGuIZN1ChDmk",
  authDomain: "shared-minds-hw5.firebaseapp.com",
  databaseURL: "https://shared-minds-hw5-default-rtdb.firebaseio.com",
  projectId: "shared-minds-hw5",
  storageBucket: "shared-minds-hw5.firebasestorage.app",
  messagingSenderId: "415216455632",
  appId: "1:415216455632:web:034422036f47249e5873d5",
  measurementId: "G-QEVJ9WDG6T"
};

const app  = initializeApp(firebaseConfig);
const db   = getDatabase(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

// --- DOM ---
const canvas        = document.getElementById('c');
const ctx           = canvas.getContext('2d');
const statusEl      = document.getElementById('status');
const authOverlay   = document.getElementById('auth-overlay');
const tooltip       = document.getElementById('tooltip');
const userBadge     = document.getElementById('user-badge');
const badgeName     = document.getElementById('badge-name');
const authError     = document.getElementById('auth-error');
const settingsPanel = document.getElementById('settings-panel');
const sizeSlider    = document.getElementById('size-slider');
const sizeLabel     = document.getElementById('size-label');
const colorLabel    = document.getElementById('color-label');
const saveMsg       = document.getElementById('save-msg');

// --- Constants ---
const RADIUS_DOTS        = 150;
const GRID               = 24;
const DOT_R              = 8;
const STEPS              = 100;
const OUTLINE_DURATION   = 10000;
const CIRCLE_RADIUS_WORLD = RADIUS_DOTS * GRID;
const VIGNETTE_MAX       = 0.97;

const VIGNETTE_SIZES = [
  { label: 'small',  inner: 3 * GRID,  outer: 9  * GRID },
  { label: 'medium', inner: 5 * GRID,  outer: 14 * GRID },
  { label: 'large',  inner: 7 * GRID,  outer: 20 * GRID },
];

const VIGNETTE_COLORS = [
  { name: 'white',    r: 255, g: 255, b: 255 },
  { name: 'warm',     r: 255, g: 240, b: 200 },
  { name: 'cool',     r: 200, g: 220, b: 255 },
  { name: 'rose',     r: 255, g: 200, b: 210 },
  { name: 'mint',     r: 180, g: 255, b: 220 },
  { name: 'gold',     r: 255, g: 220, b: 100 },
  { name: 'lavender', r: 210, g: 190, b: 255 },
  { name: 'red',      r: 255, g: 100, b: 100 },
  { name: 'sky',      r: 130, g: 210, b: 255 },
  { name: 'orange',   r: 255, g: 170, b: 80  },
];

// --- State ---
let myVigColor = VIGNETTE_COLORS[0];
let myVigSize  = VIGNETTE_SIZES[2];
let W, H, offsetX = 0, offsetY = 0, scale = 1;
let mouseWorldX = 0, mouseWorldY = 0, mouseScreenX = 0, mouseScreenY = 0;
let mouseOnScreen = false;
let displayName = null;
let currentUID  = null;

const SESSION_ID    = Math.random().toString(36).slice(2, 10);
const myCursorRef   = ref(db, `cursors/${SESSION_ID}`);
onDisconnect(myCursorRef).remove();

const dotStates     = new Map();
const dotOwners     = new Map();
const outlineStates = new Map();
const remoteCursors = new Map();

// --- Grid precompute ---
const gridPoints = [];
for (let gx = -RADIUS_DOTS; gx <= RADIUS_DOTS; gx++) {
  for (let gy = -RADIUS_DOTS; gy <= RADIUS_DOTS; gy++) {
    const wx = gx * GRID, wy = gy * GRID;
    if (Math.hypot(wx, wy) <= CIRCLE_RADIUS_WORLD)
      gridPoints.push({ gx, gy, wx, wy, key: `${gx},${gy}` });
  }
}

// --- Layout ---
function centerGrid() { offsetX = W / 2; offsetY = H / 2; }
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  centerGrid();
}
window.addEventListener('resize', resize);

// --- Firebase listeners ---
onValue(ref(db, 'dots'),     s => { dotStates.clear();    const d=s.val(); if(d) for(const[k,v] of Object.entries(d)) dotStates.set(k,v);    statusEl.textContent='live'; });
onValue(ref(db, 'owners'),   s => { dotOwners.clear();    const d=s.val(); if(d) for(const[k,v] of Object.entries(d)) dotOwners.set(k,v); });
onValue(ref(db, 'outlines'), s => { outlineStates.clear();const d=s.val(); if(d) for(const[k,v] of Object.entries(d)) outlineStates.set(k,v); });
onValue(ref(db, 'cursors'),  s => {
  remoteCursors.clear();
  const d = s.val();
  if (d) for (const [id, pos] of Object.entries(d)) if (id !== SESSION_ID) remoteCursors.set(id, pos);
});

// --- Preferences ---
function applyPrefs(colorIdx, sizeIdx) {
  myVigColor = VIGNETTE_COLORS[colorIdx] ?? VIGNETTE_COLORS[0];
  myVigSize  = VIGNETTE_SIZES[sizeIdx]   ?? VIGNETTE_SIZES[2];
  colorLabel.textContent = myVigColor.name;
  sizeLabel.textContent  = myVigSize.label;
  sizeSlider.value = sizeIdx + 1;
  document.querySelectorAll('.swatch').forEach((s, i) => s.classList.toggle('active', i === colorIdx));
}

function loadPrefs(uid) {
  if (uid) {
    onValue(ref(db, `prefs/${uid}`), snap => {
      const d = snap.val();
      if (d) applyPrefs(d.colorIdx ?? 0, d.sizeIdx ?? 2);
      else   applyPrefs(0, 2);
    }, { onlyOnce: true });
  } else {
    const ci = parseInt(localStorage.getItem('dg_color') ?? '0');
    const si = parseInt(localStorage.getItem('dg_size')  ?? '2');
    applyPrefs(ci, si);
  }
}

function savePrefs() {
  const ci = VIGNETTE_COLORS.indexOf(myVigColor);
  const si = VIGNETTE_SIZES.indexOf(myVigSize);
  localStorage.setItem('dg_color', ci);
  localStorage.setItem('dg_size',  si);
  if (currentUID) set(ref(db, `prefs/${currentUID}`), { colorIdx: ci, sizeIdx: si });
  saveMsg.textContent = 'saved';
  setTimeout(() => { saveMsg.textContent = ''; }, 2000);
}

// --- Build swatches ---
const swatchContainer = document.getElementById('color-swatches');
VIGNETTE_COLORS.forEach((col, i) => {
  const el = document.createElement('div');
  el.className = 'swatch' + (i === 0 ? ' active' : '');
  el.style.background = `rgb(${col.r},${col.g},${col.b})`;
  el.title = col.name;
  el.addEventListener('click', () => {
    myVigColor = col;
    colorLabel.textContent = col.name;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
  });
  swatchContainer.appendChild(el);
});

sizeSlider.addEventListener('input', () => {
  const idx = parseInt(sizeSlider.value) - 1;
  myVigSize = VIGNETTE_SIZES[idx];
  sizeLabel.textContent = myVigSize.label;
});

document.getElementById('save-prefs-btn').addEventListener('click', savePrefs);

// --- Settings toggle ---
document.getElementById('settings-btn').addEventListener('click', e => {
  e.stopPropagation();
  settingsPanel.style.display = settingsPanel.style.display === 'block' ? 'none' : 'block';
});
document.addEventListener('click', e => {
  if (!settingsPanel.contains(e.target) && e.target.id !== 'settings-btn')
    settingsPanel.style.display = 'none';
});

// --- Auth ---
document.getElementById('google-btn').addEventListener('click', async () => {
  authError.textContent = '';
  try {
    await signInWithPopup(auth, provider);
  } catch (e) {
    authError.textContent = 'Popup blocked. Allow popups for this site and try again.';
  }
});

document.getElementById('guest-btn').addEventListener('click', async () => {
  authError.textContent = '';
  try {
    await signInAnonymously(auth);
  } catch (e) {
    // Anonymous auth not enabled — fall back to local guest
    displayName = 'guest';
    currentUID  = null;
    authOverlay.style.display = 'none';
    userBadge.style.display   = 'flex';
    badgeName.textContent = 'guest';
    loadPrefs(null);
  }
});

document.getElementById('signout-btn').addEventListener('click', () => {
  removeCursor();
  settingsPanel.style.display = 'none';
  displayName = null; currentUID = null;
  signOut(auth);
});

onAuthStateChanged(auth, user => {
  if (user) {
    displayName = user.isAnonymous ? 'guest' : (user.displayName || user.email.split('@')[0]);
    currentUID  = user.isAnonymous ? null : user.uid;
    badgeName.textContent   = displayName;
    authOverlay.style.display = 'none';
    userBadge.style.display   = 'flex';
    loadPrefs(currentUID);
  } else {
    displayName = null; currentUID = null;
    authOverlay.style.display = 'flex';
    userBadge.style.display   = 'none';
    removeCursor();
  }
});

// --- Cursor sync ---
let lastCursorWrite = 0;
function writeCursor(wx, wy) {
  if (!displayName) return;
  const now = Date.now();
  if (now - lastCursorWrite < 40) return;
  lastCursorWrite = now;
  set(myCursorRef, {
    wx, wy, name: displayName,
    cr: myVigColor.r, cg: myVigColor.g, cb: myVigColor.b,
    vigInner: myVigSize.inner, vigOuter: myVigSize.outer
  });
}
function removeCursor() { remove(myCursorRef); }

// --- Helpers ---
function stepToColor(count) {
  const step = count % (STEPS * 2);
  const t = step <= STEPS ? step / STEPS : 1 - (step - STEPS) / STEPS;
  const v = Math.round(255 * (1 - t));
  return [v, v, v];
}

function vignetteAlpha(dotWx, dotWy, cWx, cWy, inner, outer) {
  const dist = Math.hypot(dotWx - cWx, dotWy - cWy);
  if (dist <= inner) return 0;
  if (dist >= outer) return VIGNETTE_MAX;
  const t = (dist - inner) / (outer - inner);
  return t * t * (3 - 2 * t) * VIGNETTE_MAX;
}

function worldToScreen(wx, wy) { return { sx: wx * scale + offsetX, sy: wy * scale + offsetY }; }
function screenToWorld(sx, sy) { return { wx: (sx - offsetX) / scale, wy: (sy - offsetY) / scale }; }

function getHoveredDot() {
  if (!mouseOnScreen) return null;
  const gx = Math.round(mouseWorldX / GRID), gy = Math.round(mouseWorldY / GRID);
  if (Math.hypot(gx * GRID, gy * GRID) > CIRCLE_RADIUS_WORLD) return null;
  if (Math.hypot(mouseWorldX - gx * GRID, mouseWorldY - gy * GRID) > DOT_R * 3 / scale) return null;
  return `${gx},${gy}`;
}

function drawNameTag(sx, sy, name, alpha) {
  if (alpha < 0.05) return;
  ctx.save();
  ctx.globalAlpha = alpha * 0.85;
  ctx.font = '10px monospace';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(name, sx, sy - 12);
  ctx.restore();
}

// --- Draw ---
function draw() {
  const now = Date.now();
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  const screenDotR = Math.max(1, DOT_R * scale);

  const allCursors = [];
  if (mouseOnScreen && displayName) {
    allCursors.push({ wx: mouseWorldX, wy: mouseWorldY, r: myVigColor.r, g: myVigColor.g, b: myVigColor.b, inner: myVigSize.inner, outer: myVigSize.outer });
  }
  for (const [, pos] of remoteCursors) {
    allCursors.push({ wx: pos.wx, wy: pos.wy, r: pos.cr??255, g: pos.cg??255, b: pos.cb??255, inner: pos.vigInner??VIGNETTE_SIZES[2].inner, outer: pos.vigOuter??VIGNETTE_SIZES[2].outer });
  }

  const hasCursors = allCursors.length > 0;
  const hoveredKey = getHoveredDot();

  for (const { wx, wy, key } of gridPoints) {
    const { sx, sy } = worldToScreen(wx, wy);
    if (sx < -screenDotR*2 || sx > W+screenDotR*2 || sy < -screenDotR*2 || sy > H+screenDotR*2) continue;

    const count = dotStates.get(key) || 0;
    const [dr, dg, db_] = stepToColor(count);

    let maxIllum = 0, illR = 0, illG = 0, illB = 0;
    for (const c of allCursors) {
      const a = 1 - vignetteAlpha(wx, wy, c.wx, c.wy, c.inner, c.outer);
      if (a > maxIllum) { maxIllum = a; illR = c.r/255; illG = c.g/255; illB = c.b/255; }
    }

    const finalAlpha = hasCursors ? maxIllum : 0.15;
    const ts = 0.15;
    const fr = Math.round(dr + (255 * illR - dr) * ts * maxIllum);
    const fg = Math.round(dg + (255 * illG - dg) * ts * maxIllum);
    const fb = Math.round(db_ + (255 * illB - db_) * ts * maxIllum);

    const isHovered = key === hoveredKey;
    ctx.fillStyle = `rgba(${fr},${fg},${fb},${isHovered ? Math.min(1, finalAlpha + 0.3) : finalAlpha})`;
    ctx.beginPath();
    ctx.arc(sx, sy, screenDotR * (isHovered ? 1.25 : 1), 0, Math.PI * 2);
    ctx.fill();

    const clickedAt = outlineStates.get(key);
    if (clickedAt) {
      const elapsed = now - clickedAt;
      if (elapsed < OUTLINE_DURATION) {
        ctx.strokeStyle = `rgba(180,0,0,${(1 - elapsed / OUTLINE_DURATION) * finalAlpha})`;
        ctx.lineWidth = Math.max(0.8, 1.5 * scale);
        ctx.beginPath();
        ctx.arc(sx, sy, screenDotR + Math.max(1, 2 * scale), 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  // Remote cursors
  for (const [, pos] of remoteCursors) {
    const { sx, sy } = worldToScreen(pos.wx, pos.wy);
    if (sx < 0 || sx > W || sy < 0 || sy > H) continue;
    const tagAlpha = mouseOnScreen && displayName
      ? 1 - vignetteAlpha(pos.wx, pos.wy, mouseWorldX, mouseWorldY, myVigSize.inner, myVigSize.outer)
      : 0.5;
    const cr = pos.cr??255, cg = pos.cg??255, cb = pos.cb??255;
    ctx.fillStyle = `rgba(${cr},${cg},${cb},${0.4 * tagAlpha})`;
    ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI * 2); ctx.fill();
    if (pos.name) drawNameTag(sx, sy, pos.name, tagAlpha);
  }

  // Local cursor
  if (mouseOnScreen && displayName) {
    const { sx, sy } = worldToScreen(mouseWorldX, mouseWorldY);
    ctx.fillStyle = `rgba(${myVigColor.r},${myVigColor.g},${myVigColor.b},0.9)`;
    ctx.beginPath(); ctx.arc(sx, sy, 3, 0, Math.PI * 2); ctx.fill();
  }
}

function loop() { draw(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);

// --- Tooltip ---
function updateTooltip() {
  const key = getHoveredDot();
  if (!key) { tooltip.style.display = 'none'; return; }
  const owner = dotOwners.get(key);
  if (!owner) { tooltip.style.display = 'none'; return; }
  tooltip.innerHTML = `last touched by <span class="name">${owner.name}</span><br>${timeAgo(owner.time)}`;
  tooltip.style.display = 'block';
  let tx = mouseScreenX + 16, ty = mouseScreenY - 10;
  if (tx + tooltip.offsetWidth  > W - 14) tx = mouseScreenX - tooltip.offsetWidth  - 16;
  if (ty + tooltip.offsetHeight > H - 14) ty = H - tooltip.offsetHeight - 14;
  tooltip.style.left = tx + 'px'; tooltip.style.top = ty + 'px';
}

function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 5)    return 'just now';
  if (s < 60)   return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

// --- Click ---
function handleClick(sx, sy) {
  if (!displayName) return;
  const { wx, wy } = screenToWorld(sx, sy);
  const gx = Math.round(wx / GRID), gy = Math.round(wy / GRID);
  if (Math.hypot(gx * GRID, gy * GRID) > CIRCLE_RADIUS_WORLD) return;
  if (Math.hypot(wx - gx * GRID, wy - gy * GRID) > GRID / 2) return;
  const key = `${gx},${gy}`;
  const now = Date.now();
  set(ref(db, `outlines/${key}`), now);
  set(ref(db, `owners/${key}`), { name: displayName, time: now });
  runTransaction(ref(db, `dots/${key}`), cur => ((cur||0)+1) % (STEPS*2));
}

// --- Mouse ---
let isDragging = false, dragMoved = false, dragStart = null;
const DRAG_THRESHOLD = 4;

canvas.addEventListener('mousemove', e => {
  mouseOnScreen = true;
  mouseScreenX = e.clientX; mouseScreenY = e.clientY;
  const w = screenToWorld(e.clientX, e.clientY);
  mouseWorldX = w.wx; mouseWorldY = w.wy;
  writeCursor(mouseWorldX, mouseWorldY);
  updateTooltip();
  if (!isDragging) return;
  const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
  if (!dragMoved && Math.hypot(dx, dy) > DRAG_THRESHOLD) dragMoved = true;
  if (dragMoved) {
    offsetX = dragStart.ox + dx; offsetY = dragStart.oy + dy;
    const w2 = screenToWorld(e.clientX, e.clientY);
    mouseWorldX = w2.wx; mouseWorldY = w2.wy;
  }
});
canvas.addEventListener('mouseleave', () => { mouseOnScreen=false; isDragging=false; removeCursor(); tooltip.style.display='none'; });
canvas.addEventListener('mouseenter', e => { mouseOnScreen=true; const w=screenToWorld(e.clientX,e.clientY); mouseWorldX=w.wx; mouseWorldY=w.wy; });
canvas.addEventListener('mousedown', e => { if(e.button!==0)return; isDragging=true; dragMoved=false; dragStart={x:e.clientX,y:e.clientY,ox:offsetX,oy:offsetY}; });
canvas.addEventListener('mouseup',   e => { if(!isDragging)return; isDragging=false; if(!dragMoved) handleClick(e.clientX,e.clientY); });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  const ns = Math.min(10, Math.max(0.05, scale * factor));
  offsetX = e.clientX - (e.clientX - offsetX) * (ns / scale);
  offsetY = e.clientY - (e.clientY - offsetY) * (ns / scale);
  scale = ns;
  const w = screenToWorld(e.clientX, e.clientY);
  mouseWorldX = w.wx; mouseWorldY = w.wy;
  writeCursor(mouseWorldX, mouseWorldY);
}, { passive: false });
window.addEventListener('beforeunload', () => removeCursor());

// --- Touch ---
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length===1) { isDragging=true; dragMoved=false; dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY,ox:offsetX,oy:offsetY}; }
  else if (e.touches.length===2) { isDragging=false; lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); }
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length===1 && isDragging) {
    const dx=e.touches[0].clientX-dragStart.x, dy=e.touches[0].clientY-dragStart.y;
    if (!dragMoved && Math.hypot(dx,dy)>DRAG_THRESHOLD) dragMoved=true;
    if (dragMoved) { offsetX=dragStart.ox+dx; offsetY=dragStart.oy+dy; }
  } else if (e.touches.length===2 && lastTouchDist) {
    const dist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2, cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const factor=dist/lastTouchDist;
    const ns=Math.min(10,Math.max(0.05,scale*factor));
    offsetX=cx-(cx-offsetX)*(ns/scale); offsetY=cy-(cy-offsetY)*(ns/scale);
    scale=ns; lastTouchDist=dist;
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!dragMoved && isDragging && e.changedTouches.length===1) handleClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  isDragging=false; lastTouchDist=null;
}, { passive: false });

resize();
</script>
</body>
</html>
